# One-click deploy config for Render (https://render.com).
# In Render: New + → Blueprint → connect the repo containing this file.
services:
  - type: web
    name: anomaly-paper-repo
    runtime: python
    plan: free
    rootDir: backend
    # Copy the sibling frontend into the backend dir so the server always finds
    # it, no matter how the host lays out the checkout.
    # The copy is best-effort (|| true): the app also locates ../frontend at
    # runtime, so a copy hiccup must never fail the whole build.
    buildCommand: pip install -r requirements.txt && (rm -rf ./frontend && cp -r ../frontend ./frontend || true)
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    # NOTE: Free plan = no persistent disk. The SQLite database lives on
    # temporary storage and is WIPED whenever Render restarts/redeploys the
    # service. Fine for testing. To make data persist, switch `plan` to
    # `starter` and re-add a `disk:` block mounted at /var/data, pointing
    # PAPERREPO_DB there.
    envVars:
      - key: PAPERREPO_ALLOWED_DOMAINS
        value: anomalybio.com
      - key: PAPERREPO_CONTACT_EMAIL
        value: team@anomalybio.com
      # Optional: set a shared invite code so only people with it can sign up.
      # - key: PAPERREPO_INVITE_CODE
      #   value: change-me
